name: cycle_discovery_research

data:
  symbols_mode: union
  symbols: []
  timeframes:
    - 15m
    - 1h
    - 4h
  history_days:
    15m: 720
    1h: 720
    4h: 720
  storage:
    raw_dir: data/raw
    processed_dir: data/processed

cycle_discovery:
  max_iterations: 3
  candidates_per_iteration: 3
  timeframe: 1h
  symbol_groups:
    strong:
      - RIVERUSDT
      - STOUSDT
      - MMTUSDT
      - RAVEUSDT
      - VELVETUSDT
      - PIPPINUSDT
      - SKYAIUSDT
      - COAIUSDT
      - MYXUSDT
      - BSBUSDT
    volatile:
      - WLDUSDT
      - ACTUSDT
      - PROMPTUSDT
      - SUIUSDT
      - XRPUSDT
      - LINKUSDT
      - TACUSDT
    control:
      - BTCUSDT
      - ETHUSDT
      - SOLUSDT
      - BNBUSDT
  scoring:
    target_cycles_per_symbol: 12
    max_cycles_per_symbol: 80
    target_pump_median: 0.20
    target_dump_median: 0.15
    ideal_duration_hours: 24
    max_acceptable_duration_hours: 96
    weights:
      coverage: 0.25
      strength: 0.25
      duration: 0.20
      stability: 0.15
      control_group_separation: 0.15

cycle:
  timeframe: 1h
  pump_threshold_min: 0.20
  pump_threshold_max: 0.80
  dump_return_min: 0.15
  dump_retrace_ratio: 0.50
  max_cycle_hours: 96
  dedupe_gap_hours: 24
  min_peak_distance_from_start_hours: 2
  min_pump_duration_hours: 1
  max_pump_duration_hours: 48
  overlap_dedupe_threshold: 0.50

seed_events:
  version: cycle_discovery_v1
  description: Optional manual anchors for auditing. Cycle labels are generated by deterministic rules, not by manual labels.
  manual_seed_events: []
  matching:
    tolerance_hours: 12
  commonality:
    fallback_to_cycle_config: true
