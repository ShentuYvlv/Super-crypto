name: v4a_research_pipeline

data:
  name: base_market_data
  symbols: &research_symbols
    - MMTUSDT
    - TUTUSDT
    - WCTUSDT
    - HEMIUSDT
    - PROMPTUSDT
    - VELVETUSDT
    - TACUSDT
    - ACTUSDT
    - WLDUSDT
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_days:
    1m: 7
    5m: 21
    15m: 45
    1h: 180
  market_snapshot_interval_sec: 60
  storage:
    raw_dir: data/raw
    processed_dir: data/processed
  quality:
    max_gap_minutes:
      1m: 3
      5m: 15
      15m: 45
      1h: 180
    timezone: UTC
    require_monotonic_timestamps: true

splits:
  train:
    start: 2026-04-27T00:00:00Z
    end: 2026-05-31T23:59:59Z
    symbols: *research_symbols
  validation:
    start: 2026-06-01T00:00:00Z
    end: 2026-06-14T23:59:59Z
    symbols: *research_symbols
  holdout:
    start: 2026-06-15T00:00:00Z
    end: 2026-06-29T23:59:59Z
    symbols: *research_symbols
  purge_bars: 2
  holdout_policy:
    allow_parameter_search: false
    allow_agent_access: false
    max_manual_runs: 1
    require_final_flag: true
    require_clean_experiment_log: true

cycle:
  timeframe: 15m
  pump_threshold_min: 0.20
  pump_threshold_max: 0.50
  dump_retrace_ratio: 0.55
  max_cycle_hours: 96
  dedupe_gap_hours: 6

seed_events:
  version: seed_events_v1
  description: Manual seed events from the original research note. Replace event windows with exact screenshot timestamps when available.
  manual_seed_events:
    - seed_id: river_manual_001
      symbol: RIVERUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
    - seed_id: sto_manual_001
      symbol: STOUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
    - seed_id: mmt_manual_001
      symbol: MMTUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
  matching:
    tolerance_hours: 12
  commonality:
    fallback_to_cycle_config: true

scores:
  lookback_days: 90
  decay_half_life_days: 21
  weights:
    cycle_frequency: 0.5
    avg_pump_return: 0.15
    avg_dump_return: 0.15
    oi_momentum: 0.1
    funding_extremes: 0.05
    data_completeness: 0.05
  buckets:
    ultra_high: 85
    high: 70
    medium: 55
    low: 0

enrichment:
  candidate_selection:
    top_n_by_score: 25
    min_bucket: medium
    include_open_signals: true
  binance_orderbook:
    levels: 20
    notionals_usdt:
      - 100
      - 500
      - 1000
  coinglass:
    enabled: true
    endpoints:
      - tickers
      - spot_tickers
      - futures_flow
      - spot_flow
      - coin_info
  quality:
    stale_minutes:
      tickers: 15
      futures_flow: 15
      spot_flow: 30
      coin_info: 360

experiment:
  name: experiment_v4a
  engine: event_driven
  minimum_trade_count: 20
  strategy:
    strategy: V4A
    timeframe: 15m
    lookback_bars: 18
    support_window: 6
    support_type: rolling_low
    peak_window: 12
    first_sell_pressure_threshold: -0.01
    support_break_threshold: 0.005
    trailing_stop_pct: 0.15
    stop_loss_pct: 0.15
    max_hold_bars: 8
  backtest:
    capital_per_trade_usdt: 1000
    fee_bps: 6
    slippage_bps_floor: 25
    funding_per_hour_cap_bps: 8
    max_hold_hours:
      v3: 12
      v4a: 8
      v4b: 12
    orderbook_confidence_penalty: 0.12
  scores:
    lookback_days: 90
    decay_half_life_days: 21
    weights:
      cycle_frequency: 0.5
      avg_pump_return: 0.15
      avg_dump_return: 0.15
      oi_momentum: 0.1
      funding_extremes: 0.05
      data_completeness: 0.05
    buckets:
      ultra_high: 85
      high: 70
      medium: 55
      low: 0
  splits:
    train:
      start: 2026-04-27T00:00:00Z
      end: 2026-05-31T23:59:59Z
      symbols: *research_symbols
    validation:
      start: 2026-06-01T00:00:00Z
      end: 2026-06-14T23:59:59Z
      symbols: *research_symbols
    holdout:
      start: 2026-06-15T00:00:00Z
      end: 2026-06-29T23:59:59Z
      symbols: *research_symbols
    purge_bars: 2
    holdout_policy:
      allow_parameter_search: false
      allow_agent_access: false
      max_manual_runs: 1
      require_final_flag: true
      require_clean_experiment_log: true
  parameter_grid:
    support_type: [rolling_low, rolling_close_low, confirmed_pivot_low, pump_since_low]
    first_sell_pressure_threshold: [-0.015, -0.01, -0.005]
    support_break_threshold: [0.003, 0.005, 0.008]
    trailing_stop_pct: [0.015, 0.02, 0.025]
    stop_loss_pct: [0.012, 0.015, 0.018]

stages:
  ingest:
    enabled: true
    skip_if_fresh: true
    freshness_hours: 6
  build_splits:
    enabled: true
    skip_if_exists: true
  detect_cycles:
    enabled: true
    rebuild: false
  build_event_set:
    enabled: true
  score_symbols:
    enabled: true
    point_in_time: true
  enrich:
    enabled: true
    candidate_only: true
    skip_if_fresh: true
    freshness_minutes: 15
  run_experiment:
    enabled: true
    engine: event_driven
    split: train_validation
  report:
    enabled: true
    formats:
      - markdown
      - html

guards:
  forbid_holdout_without_final: true
  forbid_agent_holdout_access: true
  require_clean_git: false
  require_config_hash: true
  require_split_hash: true
  require_data_snapshot_hash: true
