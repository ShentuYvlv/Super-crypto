name: v4a_research_pipeline

data:
  name: base_market_data
  symbols_mode: union
  timeframes:
    - 1m
    - 5m
    - 15m
    - 1h
  history_days:
    1m: 7
    5m: 21
    15m: 320
    1h: 220
  market_snapshot_interval_sec: 60
  storage:
    raw_dir: data/raw
    processed_dir: data/processed
  quality:
    max_gap_minutes:
      1m: 3
      5m: 15
      15m: 45
      1h: 180
    timezone: UTC
    require_monotonic_timestamps: true

splits:
  symbols:
    - RAVEUSDT
    - STOUSDT
    - RIVERUSDT
    - LABUSDT
    - VELVETUSDT
  train:
    start: 2026-04-27T00:00:00Z
    end: 2026-05-31T23:59:59Z
  validation:
    start: 2026-06-01T00:00:00Z
    end: 2026-06-14T23:59:59Z
  holdout:
    start: 2026-06-15T00:00:00Z
    end: 2026-06-29T23:59:59Z
  purge_bars: 2
  holdout_policy:
    allow_parameter_search: false
    allow_agent_access: false
    max_manual_runs: 1
    require_final_flag: true
    require_clean_experiment_log: true

cycle:
  timeframe: 15m
  pump_threshold_min: 0.20
  pump_threshold_max: 0.50
  dump_retrace_ratio: 0.55
  max_cycle_hours: 96
  dedupe_gap_hours: 6

seed_events:
  version: seed_events_v1
  description: Manual seed events from the original research note. Replace event windows with exact screenshot timestamps when available.
  manual_seed_events:
    - seed_id: river_manual_001
      symbol: RIVERUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
    - seed_id: sto_manual_001
      symbol: STOUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
    - seed_id: mmt_manual_001
      symbol: MMTUSDT
      source: docs/6.28 指导文章.md
      note: Original hand-captured manipulation event seed; exact screenshot window not yet recorded.
      pump_start: null
      peak_time: null
      dump_end: null
  matching:
    tolerance_hours: 12
  commonality:
    fallback_to_cycle_config: true

scores:
  lookback_days: 90
  decay_half_life_days: 21
  weights:
    cycle_frequency: 0.5
    avg_pump_return: 0.15
    avg_dump_return: 0.15
    oi_momentum: 0.1
    funding_extremes: 0.05
    data_completeness: 0.05
  buckets:
    ultra_high: 85
    high: 70
    medium: 55
    low: 0

enrichment:
  candidate_selection:
    top_n_by_score: 25
    min_bucket: medium
    include_open_signals: true
  binance_orderbook:
    levels: 20
    notionals_usdt:
      - 100
      - 500
      - 1000
  coinglass:
    enabled: true
    endpoints:
      - tickers
      - spot_tickers
      - futures_flow
      - spot_flow
      - coin_info
  quality:
    stale_minutes:
      tickers: 15
      futures_flow: 15
      spot_flow: 30
      coin_info: 360

phase1_prediction:
  enabled: true
  label_source: data/labels/phase1_events.csv
  timeframe: 15m
  lead_time_hours: 4
  minimum_labels_to_run: 10
  allowed_label_quality: [A, B]
  auto_event_detection:
    enabled: true
    pump_return_min: 0.15
    min_event_gap_hours: 12
    peak_search_hours: 48
    dump_search_hours: 72
  # Phase1 不再要求逐个事件人工标注；这里只填“这个币在这段时间内发生过操纵/拉盘窗口”。
  # 代码会在窗口内自动定位 event_start / peak_time / dump_end，并写入 data/processed/phase1/labels_used.csv 审计。
  event_windows:
    - window_id: river_seed_train_001
      symbol: RIVERUSDT
      split: train
      start: "2025-12-26T00:00:00Z"
      end: "2026-02-10T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: Replace with the real RIVER manipulation window from the article seed set.
    - window_id: sto_seed_train_001
      symbol: STOUSDT
      split: train
      start: "2026-03-20T00:00:00Z"
      end: "2026-04-15T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: Replace with the real STO manipulation window from the article seed set.
    - window_id: velvet_seed_validation_001
      symbol: VELVETUSDT
      split: validation
      start: "2026-05-30T00:00:00Z"
      end: "2026-07-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: VELVET validation manipulation window.
    - window_id: lab_seed_validation_001
      symbol: LABUSDT
      split: validation
      start: "2026-04-25T00:00:00Z"
      end: "2026-07-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: LAB validation manipulation window.
    - window_id: rave_seed_holdout_001
      symbol: RAVEUSDT
      split: holdout
      start: "2026-03-01T00:00:00Z"
      end: "2026-05-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: RAVE holdout manipulation window.
    - window_id: tac_seed_train_001
      symbol: TACUSDT
      split: train
      start: "2026-06-01T00:00:00Z"
      end: "2026-07-02T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: TAC train manipulation window.
    - window_id: bsb_seed_train_001
      symbol: BSBUSDT
      split: train
      start: "2026-04-01T00:00:00Z"
      end: "2026-06-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: BSB train manipulation window.
    - window_id: myx_seed_train_001
      symbol: MYXUSDT
      split: train
      start: "2025-09-01T00:00:00Z"
      end: "2025-11-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: MYX train manipulation window.
    - window_id: coai_seed_holdout_001
      symbol: COAIUSDT
      split: holdout
      start: "2025-10-01T00:00:00Z"
      end: "2025-11-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: COAI holdout manipulation window.
    - window_id: skyai_seed_train_001
      symbol: SKYAIUSDT
      split: train
      start: "2026-04-01T00:00:00Z"
      end: "2026-06-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: SKYAI train manipulation window.
    - window_id: pippin_seed_train_001
      symbol: PIPPINUSDT
      split: train
      start: "2025-11-01T00:00:00Z"
      end: "2026-04-01T00:00:00Z"
      label_quality: A
      source: yaml_window_auto_detect
      note: PIPPIN train manipulation window.

  negative_sample_ratio: 5
  negative_gap_hours: 48
  candidate_cooldown_hours: 24
  candidate_thresholds:
    return_4h_min: 0.15
    return_24h_min: 0.30
    volume_zscore_min: 3.0
    range_pct_min: 0.20
  experiments:
    - fr_baseline
    - fr_oi
    - fr_oi_liquidation
    - fr_oi_liquidation_taker
    - all_available_features
    - lightgbm_all_features

experiment:
  name: experiment_v4a
  engine: event_driven
  minimum_trade_count: 20
  strategy:
    strategy: V4A
    timeframe: 15m
    lookback_bars: 18
    support_window: 6
    support_type: rolling_low
    peak_window: 12
    first_sell_pressure_threshold: -0.01
    support_break_threshold: 0.005
    trailing_stop_pct: 0.15
    stop_loss_pct: 0.15
    max_hold_bars: 8
  backtest:
    capital_per_trade_usdt: 1000
    fee_bps: 6
    slippage_bps_floor: 25
    funding_per_hour_cap_bps: 8
    max_hold_hours:
      v3: 12
      v4a: 8
      v4b: 12
    orderbook_confidence_penalty: 0.12
  scores:
    lookback_days: 90
    decay_half_life_days: 21
    weights:
      cycle_frequency: 0.5
      avg_pump_return: 0.15
      avg_dump_return: 0.15
      oi_momentum: 0.1
      funding_extremes: 0.05
      data_completeness: 0.05
    buckets:
      ultra_high: 85
      high: 70
      medium: 55
      low: 0
  parameter_grid:
    support_type: [rolling_low, rolling_close_low, confirmed_pivot_low, pump_since_low]
    first_sell_pressure_threshold: [-0.015, -0.01, -0.005]
    support_break_threshold: [0.003, 0.005, 0.008]
    trailing_stop_pct: [0.015, 0.02, 0.025]
    stop_loss_pct: [0.012, 0.015, 0.018]

stages:
  ingest:
    enabled: true
    skip_if_fresh: true
    freshness_hours: 6
  build_splits:
    enabled: true
    skip_if_exists: true
  detect_cycles:
    enabled: true
    rebuild: false
  build_event_set:
    enabled: true
  score_symbols:
    enabled: true
    point_in_time: true
  enrich:
    enabled: true
    candidate_only: true
    skip_if_fresh: true
    freshness_minutes: 15
  run_phase1_prediction:
    enabled: false
  run_experiment:
    enabled: true
    engine: event_driven
    split: train_validation
  report:
    enabled: true
    formats:
      - markdown
      - html

guards:
  forbid_holdout_without_final: true
  forbid_agent_holdout_access: true
  require_clean_git: false
  require_config_hash: true
  require_split_hash: true
  require_data_snapshot_hash: true
